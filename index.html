<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARAJ TEİAŞ // Cloud Edition</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#dc2626',
                        darkBg: '#0a0b0d',
                        panelBg: '#111317'
                    }
                }
            }
        }
    </script>
    <style>
        .bg-carbon {
            background-image: radial-gradient(circle at 1px 1px, #1a1d24 1px, transparent 0);
            background-size: 24px 24px;
        }
        .stealth-panel {
            background: rgba(17, 19, 23, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.3);
        }
        .input-focus:focus {
            border-color: #dc2626;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.15);
        }
    </style>
</head>
<body class="bg-darkBg text-zinc-200 font-sans antialiased bg-carbon selection:bg-brand selection:text-white">

    <!-- TOP NAVIGATION -->
    <nav class="bg-panelBg/90 backdrop-blur-md border-b border-zinc-800/80 sticky top-0 z-50 px-4 lg:px-8 shadow-xl">
        <div class="max-w-7xl mx-auto flex items-center justify-between h-16">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-6 bg-brand rounded-sm"></div>
                <span class="text-md font-black tracking-widest text-white uppercase font-mono">GARAJ <span class="text-zinc-500">TEİAŞ</span></span>
                <span class="text-[9px] bg-zinc-900 text-zinc-400 font-mono px-2 py-0.5 rounded border border-zinc-800/80 tracking-widest">v5.0 LIVE_CLOUD</span>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="openMediaModal()" class="bg-zinc-900 hover:bg-zinc-800 text-zinc-300 font-bold px-4 py-2.5 rounded-lg text-xs transition-all uppercase tracking-wider border border-zinc-800 shadow-md shadow-black/40">
                    + MEDYA YÜKLE
                </button>
                <div id="authZone" class="flex items-center gap-2"></div>
            </div>
        </div>
    </nav>

    <!-- ANA DASHBOARD DÜZENİ -->
    <main class="max-w-7xl mx-auto px-4 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- SOL PANEL -->
            <aside class="space-y-6">
                <div class="stealth-panel rounded-xl p-5 shadow-2xl relative overflow-hidden">
                    <p class="text-[10px] font-mono text-zinc-500 mb-4 uppercase tracking-widest border-b border-zinc-800/60 pb-1">TELEMETRİ MERKEZİ</p>
                    <div id="userInfo"></div>
                </div>

                <div class="stealth-panel rounded-xl p-3 space-y-1 shadow-2xl">
                    <p class="text-[10px] font-mono text-zinc-500 px-3 mb-3 uppercase tracking-widest">KANAL LİSTESİ</p>
                    <div class="w-full flex items-center justify-between px-3 py-3 rounded-lg bg-zinc-900 text-white text-xs font-bold tracking-wider text-left border-l-2 border-brand">
                        <span>🌐 CANLI BULUT AKIŞI</span>
                    </div>
                </div>
            </aside>

            <!-- SAĞ KISIM -->
            <section class="col-span-1 lg:col-span-3 space-y-6">
                <div id="feedContainer" class="space-y-6"></div>

                <div id="securityLog" class="p-4 bg-zinc-950/80 border border-zinc-900 rounded-xl font-mono text-[11px] text-zinc-500 tracking-wide">
                    [SYSTEM] Bulut veritabanı bağlantısı bekleniyor...
                </div>
            </section>
        </div>
    </main>

    <!-- MODAL: GİRİŞ YAP & KAYIT OL -->
    <div id="authModal" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="stealth-panel bg-panelBg w-full max-w-md rounded-xl p-6 border border-zinc-800 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-3">
                <h3 id="modalTitle" class="text-xs font-black tracking-widest text-white font-mono uppercase">SİSTEME BAĞLAN</h3>
                <button onclick="closeAuthModal()" class="text-zinc-500 hover:text-white transition text-xl font-mono">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-mono text-zinc-400 mb-1.5 uppercase tracking-wider">Kullanıcı Adı</label>
                    <input type="text" id="authUsername" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-sm focus:outline-none input-focus text-white font-mono">
                </div>
                <div>
                    <label class="block text-[10px] font-mono text-zinc-400 mb-1.5 uppercase tracking-wider">Şifre</label>
                    <div class="relative">
                        <input type="password" id="authPassword" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg pl-4 pr-12 py-3 text-sm focus:outline-none input-focus text-white font-mono">
                        <button type="button" onclick="togglePasswordVisibility('authPassword', 'authPasswordEye')" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 text-sm">
                            <span id="authPasswordEye">👁️</span>
                        </button>
                    </div>
                </div>
                <div class="pt-2">
                    <button onclick="submitAuth()" id="modalSubmitBtn" class="w-full bg-brand text-white font-bold py-3.5 rounded-lg text-xs uppercase tracking-widest">YETKİ AL (LOGIN)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: YENİ GÖNDERİ -->
    <div id="mediaModal" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="stealth-panel bg-panelBg w-full max-w-lg rounded-xl p-6 border border-zinc-800 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-3">
                <h3 class="text-xs font-black tracking-widest text-white font-mono uppercase">YENİ TELEMETRİ GÖNDERİSİ</h3>
                <button onclick="closeMediaModal()" class="text-zinc-500 hover:text-white transition text-xl font-mono">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-mono text-zinc-400 mb-1.5 uppercase tracking-wider">Gönderi Başlığı</label>
                    <input type="text" id="postTitle" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-sm focus:outline-none input-focus text-white">
                </div>
                <div>
                    <label class="block text-[10px] font-mono text-zinc-400 mb-1.5 uppercase tracking-wider">Cihazdan Resim Seç</label>
                    <div class="flex items-center justify-center w-full">
                        <label for="postFile" class="flex flex-col items-center justify-center w-full h-32 border-2 border-zinc-800 border-dashed rounded-lg cursor-pointer bg-zinc-950/50">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <span class="text-2xl mb-1">📁</span>
                                <p id="postFileLabel" class="text-xs text-zinc-400 font-mono text-center px-4">Resim dosyası seç</p>
                            </div>
                            <input id="postFile" type="file" accept="image/*" class="hidden" onchange="handleFileSelect(this, 'postFileLabel', 'postImgBase64')" />
                        </label>
                    </div>
                    <input type="hidden" id="postImgBase64" value="">
                </div>
                <div class="pt-2">
                    <button onclick="submitPost()" class="w-full bg-brand text-white font-bold py-3.5 rounded-lg text-xs uppercase tracking-widest">HATTA YAYINLA (SHARE)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT ENGINE -->
    <script>
        // --- !!! SUPABASE BAĞLANTI AYARLARI !!! ---
        const SUPABASE_URL = "https://legvpdyyizsqqqafcyhu.supabase.co/rest/v1/"; 
        const SUPABASE_KEY = "sb_publishable_c81XX7UrvV2J0silxW7xoA_ZP18UjYD";
        // ------------------------------------------

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);                    
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const defaultAvatar = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2371717a'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";
        const ADMIN_USERNAME = "Rafa27";
        const MY_SCREEN_WIDTH = 1600; 
        const MY_SCREEN_HEIGHT = 900;
        const MY_ALLOWED_IP = "85.107.100.91";

        let userDetectedIP = "Sorgulanıyor...";
        let isRegisterMode = false;
        let cachedUsers = {};

        function handleFileSelect(input, labelId, hiddenInputId) {
            const file = input.files[0];
            const label = document.getElementById(labelId);
            const hiddenInput = document.getElementById(hiddenInputId);
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { alert("Bulut sistemi için resim max 2MB olmalıdır!"); input.value = ""; return; }
            label.innerText = `⏳ İşleniyor...`;
            const reader = new FileReader();
            reader.onload = function (e) { hiddenInput.value = e.target.result; label.innerText = `✅ Seçildi`; };
            reader.readAsDataURL(file);
        }

        function togglePasswordVisibility(inputId, eyeId) {
            const input = document.getElementById(inputId);
            const eye = document.getElementById(eyeId);
            if (input.type === "password") { input.type = "text"; eye.innerText = "🙈"; } 
            else { input.type = "password"; eye.innerText = "👁️"; }
        }

        async function fetchUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userDetectedIP = data.ip.trim(); 
            } catch (err) { userDetectedIP = "IP_ALINAMADI"; }
            init();
        }

        async function init() { 
            await fetchUsersCache();
            renderAuthUI(); 
            await renderFeed(); 
        }

        function isHardwareVerified() {
            return (window.screen.width === MY_SCREEN_WIDTH && window.screen.height === MY_SCREEN_HEIGHT && userDetectedIP === MY_ALLOWED_IP.trim());
        }

        async function fetchUsersCache() {
            let { data } = await _supabase.from('garaj_users').select('*');
            cachedUsers = {};
            if(data) {
                data.forEach(u => { cachedUsers[u.username] = u; });
            }
        }

        function renderAuthUI() {
            const authZone = document.getElementById('authZone');
            const userInfo = document.getElementById('userInfo');
            const currentUser = localStorage.getItem('garaj_active_user') || null;
            const logPanel = document.getElementById('securityLog');

            if(currentUser) {
                const isUtku = (currentUser.toLowerCase() === ADMIN_USERNAME.toLowerCase());
                const isAdminVerified = isUtku && isHardwareVerified();
                const userAvatar = (cachedUsers[currentUser] && cachedUsers[currentUser].avatar) ? cachedUsers[currentUser].avatar : defaultAvatar;

                authZone.innerHTML = `
                    <span class="text-xs font-bold ${isUtku ? 'text-brand' : 'text-zinc-400'} font-mono">${currentUser}${isAdminVerified ? ' [ROOT]' : ''}</span>
                    <button onclick="logout()" class="text-[11px] text-zinc-500 hover:text-brand transition font-mono ml-2">MOLA VER</button>
                `;

                userInfo.innerHTML = `
                    <div class="flex items-center gap-3 mb-4">
                        <img src="${userAvatar}" class="w-11 h-11 rounded border ${isUtku ? 'border-brand' : 'border-zinc-700'} object-cover">
                        <div>
                            <p class="font-bold text-white text-sm font-mono">@${currentUser}</p>
                            <p class="text-[9px] font-mono ${isUtku ? 'text-brand' : 'text-zinc-500'} mt-1 tracking-widest">
                                ${isAdminVerified ? 'SYSTEM_ROOT_ACTIVE' : 'CLOUD_LINK_ACTIVE'}
                            </p>
                        </div>
                    </div>
                `;

                if (isUtku) {
                    if (isHardwareVerified()) {
                        logPanel.innerHTML = `[CLOUD SUCCESS] ROOT Onaylandı. IP: ${userDetectedIP} • Siber Kalkan: BULUTTA AKTİF`;
                        logPanel.style.color = '#00ff00';
                    } else {
                        logPanel.innerHTML = `[ALERT] Donanım Eşleşmiyor! Donanım Kilidi Nedeniyle Silme Yetkisi Kapatıldı. IP: ${userDetectedIP}`;
                        logPanel.style.color = '#ff3333';
                    }
                } else {
                    logPanel.innerHTML = `[INFO] Bulut veritabanına bağlı standart kullanıcı: @${currentUser}`;
                    logPanel.style.color = '#888';
                }
            } else {
                authZone.innerHTML = `
                    <button onclick="openAuthModal(false)" class="border border-zinc-800 text-zinc-300 px-4 py-2 rounded-lg text-xs font-bold font-mono">BAĞLAN</button>
                    <button onclick="openAuthModal(true)" class="bg-brand text-white px-4 py-2 rounded-lg text-xs font-bold font-mono">KAYIT OL</button>
                `;
                userInfo.innerHTML = `<p class="text-zinc-600 text-[11px] font-mono">DISCONNECTED // NO_AUTH</p>`;
                logPanel.innerHTML = `[SYSTEM] Canlı bulut yayını misafir modu aktif.`;
                logPanel.style.color = '#555';
            }
        }

        async function renderFeed() {
            const container = document.getElementById('feedContainer');
            container.innerHTML = `<div class="text-center text-zinc-500 font-mono text-xs py-4">⏳ Buluttan veriler senkronize ediliyor...</div>`;
            
            let { data: posts, error } = await _supabase.from('garaj_posts').select('*').order('id', { ascending: false });
            container.innerHTML = "";

            if(!posts || posts.length === 0) {
                container.innerHTML = `<div class="stealth-panel rounded-xl p-12 text-center text-zinc-500 font-mono text-xs">⚠️ GARAJ AKIŞINDA MEDYA BULUNAMADI.</div>`;
                return;
            }

            const currentUser = localStorage.getItem('garaj_active_user') || '';
            const isUserAdmin = (currentUser.toLowerCase() === ADMIN_USERNAME.toLowerCase() && isHardwareVerified());

            posts.forEach(post => {
                const deleteButtonHTML = isUserAdmin 
                    ? `<button onclick="deletePost(${post.id})" class="text-[9px] font-mono bg-brand/10 hover:bg-brand text-brand hover:text-white border border-brand/30 px-2 py-1 rounded">SİL</button>` 
                    : '';
                const currentPostAvatar = (cachedUsers[post.username] && cachedUsers[post.username].avatar) ? cachedUsers[post.username].avatar : defaultAvatar;

                container.innerHTML += `
                    <div class="stealth-panel rounded-xl overflow-hidden shadow-2xl">
                        <div class="p-4 flex items-center justify-between bg-zinc-950/40 border-b border-zinc-900">
                            <div class="flex items-center gap-3">
                                <img src="${currentPostAvatar}" class="w-8 h-8 rounded object-cover border border-zinc-800">
                                <div>
                                    <h4 class="text-xs font-bold text-white font-mono">@${post.username}</h4>
                                    <span class="text-[10px] text-zinc-500 font-mono">${post.time}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                ${deleteButtonHTML}
                                <span class="text-[10px] font-mono bg-zinc-900 border border-zinc-800 px-3 py-1 rounded-md text-zinc-400 font-bold">MEDYA</span>
                            </div>
                        </div>
                        <div class="relative bg-zinc-950 border-b border-zinc-900">
                            <img src="${post.img}" class="w-full object-cover max-h-[480px]">
                            <div class="p-4 bg-gradient-to-t from-zinc-950 via-zinc-950/40 to-transparent pt-12">
                                <p class="text-base font-bold tracking-wide text-white uppercase font-mono">${post.title}</p>
                            </div>
                        </div>
                        <div class="p-3.5 flex items-center gap-5 text-zinc-400 bg-zinc-950/20">
                            <button onclick="giveVoltage(${post.id}, ${post.voltage})" class="hover:text-brand flex items-center gap-1.5 transition text-zinc-300 font-mono text-xs font-bold">
                                <span class="text-amber-500">⚡</span> <span>${post.voltage} HP</span>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function openMediaModal() {
            const currentUser = localStorage.getItem('garaj_active_user');
            if(!currentUser) { alert("Önce sisteme bağlanman gerekiyor kanka!"); openAuthModal(false); return; }
            document.getElementById('postTitle').value = ""; document.getElementById('postFile').value = ""; document.getElementById('postImgBase64').value = "";
            document.getElementById('postFileLabel').innerText = "Resim dosyası seç";
            document.getElementById('mediaModal').style.display = 'flex';
        }
        function closeMediaModal() { document.getElementById('mediaModal').style.display = 'none'; }

        async function submitPost() {
            const title = document.getElementById('postTitle').value.trim();
            const imgBase64 = document.getElementById('postImgBase64').value;
            const currentUser = localStorage.getItem('garaj_active_user') || 'Ziyaretçi';
            if(!title || !imgBase64) { alert("Başlık ve Dosya seçimi zorunlu kanka!"); return; }

            const newPost = { 
                id: Date.now(), 
                username: currentUser, 
                title: title, 
                img: imgBase64, 
                voltage: 0, 
                time: new Date().toLocaleDateString('tr-TR') 
            };

            const { error } = await _supabase.from('garaj_posts').insert([newPost]);
            if(error) { alert("Veritabanına yazılırken hata oluştu!"); console.error(error); return; }
            
            closeMediaModal(); 
            await renderFeed();
        }

        function openAuthModal(registerMode = false) {
            isRegisterMode = registerMode; document.getElementById('authModal').style.display = 'flex';
            const title = document.getElementById('modalTitle'); const btn = document.getElementById('modalSubmitBtn');
            document.getElementById('authUsername').value = ""; document.getElementById('authPassword').value = "";
            
            if(isRegisterMode) {
                title.innerText = "YENİ SÜRÜCÜ KAYDI"; btn.innerText = "HESAP OLUŞTUR";
            } else {
                title.innerText = "SİSTEME BAĞLAN"; btn.innerText = "YETKİ AL (LOGIN)";
            }
        }
        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

        async function submitAuth() {
            const user = document.getElementById('authUsername').value.trim();
            const pass = document.getElementById('authPassword').value.trim();
            if(!user || !pass) { alert("Alanları doldur kanka!"); return; }
            const hashedPass = await sha256(pass);

            if(isRegisterMode) {
                if(cachedUsers[user]) { alert("Bu kullanıcı adı zaten alınmış!"); return; }
                const newUser = { username: user, password: hashedPass, avatar: defaultAvatar };
                
                const { error } = await _supabase.from('garaj_users').insert([newUser]);
                if(error) { alert("Kayıt başarısız!"); return; }
                
                await fetchUsersCache();
                alert("Kayıt başarılı! Giriş yapabilirsin.");
                openAuthModal(false);
            } else {
                const targetUser = cachedUsers[user];
                if(targetUser && targetUser.password === hashedPass) {
                    localStorage.setItem('garaj_active_user', user);
                    closeAuthModal();
                    await init();
                } else {
                    alert("❌ Kullanıcı adı veya şifre hatalı!");
                }
            }
        }

        async function deletePost(postId) {
            const currentUser = localStorage.getItem('garaj_active_user') || '';
            if (!isHardwareVerified() || currentUser.toLowerCase() !== ADMIN_USERNAME.toLowerCase()) { 
                alert("❌ ACCESS DENIED!"); return; 
            }
            if (confirm("Silmek istediğinize emin misiniz?")) {
                await _supabase.from('garaj_posts').delete().eq('id', postId);
                await renderFeed();
            }
        }

        async function giveVoltage(postId, currentVoltage) {
            await _supabase.from('garaj_posts').update({ voltage: currentVoltage + 1 }).eq('id', postId);
            await renderFeed();
        }

        function logout() { localStorage.removeItem('garaj_active_user'); init(); }
        window.onload = fetchUserIP;
    </script>
</body>
</html>
